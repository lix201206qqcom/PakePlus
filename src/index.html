<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>网址收藏库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, -apple-system, sans-serif;
            transition: all 0.22s ease;
        }
        img {
            -webkit-user-drag: none;
            user-select: none;
            pointer-events: auto;
        }
        :root {
            --bg: #f5f6f8;
            --card: #ffffff;
            --text: #1a1a1a;
            --text2: #666;
            --border: #d1d5db;
            --primary: #007aff;
            --mask: rgba(0,0,0,0.4);
        }
        html[data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #f0f0f0;
            --text2: #bbbbbb;
            --border: #333;
            --mask: rgba(0,0,0,0.7);
        }
        @media (prefers-color-scheme: dark) {
            html[data-theme="auto"] {
                --bg: #121212;
                --card: #1e1e1e;
                --text: #f0f0f0;
                --text2: #bbbbbb;
                --border: #333;
                --mask: rgba(0,0,0,0.7);
            }
        }
        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        .mask-layer {
            position: fixed;
            inset: 0;
            background: var(--mask);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .mask-layer:not(.hidden) {
            opacity: 1;
            pointer-events: auto;
        }
        .add-site-pop,
        .edit-site-pop,
        .del-site-pop,
        .theme-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.92);
            width: 90%;
            max-width: 360px;
            background: var(--card);
            border-radius: 20px;
            padding: 26px;
            z-index: 100;
            box-shadow: none;
            box-shadow: none;
            pointer-events: none;
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .add-site-pop.show,
        .edit-site-pop.show,
        .del-site-pop.show,
        .theme-popup.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        .pop-title {
            font-size: 20px;
            color: var(--text);
            text-align: center;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .input-box {
            width: 100%;
            height: 48px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
            margin-bottom: 16px;
            color: var(--text);
        }
        .input-box:focus {
            border-color: var(--primary);
        }
        .btn-group {
            display: flex;
            gap: 14px;
            margin-top: 10px;
        }
        .base-btn {
            flex: 1;
            height: 46px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.22s ease;
        }
        .base-btn:active {
            transform: scale(0.95);
        }
        .btn-blue { background: var(--primary); color: #fff; }
        .btn-red { background: #ff3b30; color: #fff; }
        .btn-gray { background: #e5e6eb; color: var(--text); }
        .theme-option {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 16px;
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            transition: all 0.22s ease;
        }
        .theme-option:active {
            transform: scale(0.97);
            background: var(--primary);
            color: #fff;
        }
        .theme-close {
            margin-top: 10px;
            padding: 14px;
            border-radius: 12px;
            background: #e5e6eb;
            color: #333;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.22s ease;
        }
        .pwd-page { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: flex-start; padding-top: 20px; }
.pwd-card {
    width: 90%;
    max-width: 420px;
    background: var(--card);
    border-radius: 20px;
    padding: 40px 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12); /* 这一行就是密码页阴影 */
}

        .pwd-title { font-size: 22px; color: var(--text); text-align: center; margin-bottom: 35px; font-weight: 500; }
        .pwd-input { width: 100%; height: 54px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0 15px; font-size: 16px; outline: none; margin-bottom: 30px; color: var(--text); }
        .pwd-input:focus { border-color: var(--primary); }
        .pwd-btn-group { display: flex; gap: 16px; }
        .pwd-btn { flex: 1; height: 50px; border-radius: 12px; border: none; font-size: 16px; cursor: pointer; transition: all 0.22s ease; }
        .pwd-btn:active { transform: scale(0.96); }
        .pwd-btn-blue { background: var(--primary); color: #fff; }
        .pwd-btn-gray { background: #e5e6eb; color: var(--text); }
        .main-page { position: fixed; inset: 0; background: var(--bg); display: none; z-index: 10; }
        .nav-bar {
            height: 50px;
            background: var(--card);
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            position: relative;
        }
        .nav-normal {
            display: flex;
            align-items: center;
            gap: 4px;
            width: 100%;
        }
        .icon-btn {
            width: 46px;
            height: 46px;
            border: none;
            background: transparent;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.22s ease;
        }
        .icon-btn:active { background: #f0f1f3; transform: scale(0.92); }
        .icon-btn img { width: 23px; height: 23px; }
        .search-ellipse {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 20px);
            height: 44px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 999px;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            z-index: 30;
        }
        .search-ellipse.show {
            display: flex;
        }
        .search-icon {
            width: 34px;
            height: 34px;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-icon img {
            width: 22px;
            height: 22px;
        }
        .search-input {
            flex: 1;
            height: 34px;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font-size: 15px;
        }
        .search-close {
            width: 34px;
            height: 34px;
            border: none;
            background: transparent;
            font-size: 18px;
            color: var(--text);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-close:active {
            background: var(--border);
        }
        .collect-area {
            padding: 18px;
            height: calc(100vh - 50px);
            overflow-y: auto;
        }
        .site-item {
            width: 100%;
            background: var(--card);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.22s ease;
        }
        .site-item:active { transform: scale(0.98); }
        .site-icon {
            width: 36px;
            height: 36px;
            border-radius: 0;
            object-fit: cover;
            flex-shrink: 0;
            transition: all 0.22s ease;
        }
        .text-scroll-wrap { flex: 1; overflow: hidden; }
        .site-text {
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow-x: auto;
            padding: 4px 0;
            -ms-overflow-style: none;
            scrollbar-width: none;
            cursor: pointer;
        }
        .site-text::-webkit-scrollbar { display: none; }
        .btn-group-row { display: flex; gap: 6px; flex-shrink: 0; }
        .edit-icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.22s ease;
        }
        .edit-icon:active { background: #f0f1f3; transform: scale(0.92); }
        .edit-icon-btn img { width: 22px; height: 22px; }
        .add-float-btn {
            position: fixed; right: 28px; bottom: 32px; width: 62px; height: 62px;
            border-radius: 50%; background: var(--primary); color: #fff; font-size: 34px;
            border: none; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
            transition: all 0.22s ease;
            z-index: 15;
        }
        .add-float-btn:active { transform: scale(0.9); }
        .sub-page {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 20;
            padding: 0;
            opacity: 0;
            transform: translateX(30px);
            pointer-events: none;
            transition: all 0.25s ease;
            height: 100vh;
            overflow-y: auto;
        }
        .sub-page:not(.hidden) { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .page-title { font-size: 22px; font-weight: 500; margin: 15px 0 25px; color: var(--text); }
        /* 移除原back-btn样式（删除上一页按钮UI） */
        .item-btn { width: 100%; padding: 18px 16px; background: var(--card); border-radius: 10px; margin-bottom: 10px; border: none; text-align: left; font-size: 15px; cursor: pointer; color: var(--text); transition: all 0.22s ease; }
        .item-btn:active { background: #f0f1f3; transform: scale(0.98); }
        .status-bar { width: 100%; padding: 18px; background: var(--card); border-radius: 14px; margin-bottom: 20px; text-align: center; font-size: 17px; color: var(--text); }
        .action-btn { width: 100%; padding: 18px; background: var(--primary); color: #fff; border-radius: 14px; border: none; font-size: 16px; margin-bottom: 15px; cursor: pointer; transition: all 0.22s ease; }
        .action-btn:active { opacity: 0.97; transform: scale(0.97); }
        .about-card { background: var(--card); margin: 0 0 12px 0; border-radius: 10px; overflow: hidden; }
        .about-app-info { text-align: center; padding: 20px 16px; }
        .about-app-icon { width: 60px; height: 60px; margin: 0 auto 12px; border-radius: 14px; background: url("icon.png") center/contain no-repeat; }
        .about-app-name { font-size: 21px; font-weight: 500; margin-bottom: 4px; color: var(--text); }
        .about-version-desc { font-size: 14px; color: var(--text2); }
        .about-section-title { font-size: 13px; color: var(--text2); padding: 10px 20px 6px; }
        .about-version-content { padding: 0 20px 14px; font-size: 14px; line-height: 1.65; color: var(--text2); }
        .icon-select-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .icon-preview {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.22s ease;
        }
        .icon-preview:active {
            transform: scale(0.9);
        }
        .icon-preview img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .select-icon-btn {
            flex: 1;
            height: 48px;
            border-radius: 12px;
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.22s ease;
        }
        .select-icon-btn:active {
            transform: scale(0.95);
        }
        .img-preview-layer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            display: none;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .img-preview-layer.show {
            display: flex;
            opacity: 1;
        }
        .preview-full-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 0;
            user-select: none;
            touch-action: none;
            transition: none !important;
        }
        .hidden { display: none !important; }
        /* 内置浏览器样式 */
        .browser-page{
            position:fixed;inset:0;background:var(--bg);z-index:25;opacity:0;transform:translateX(30px);pointer-events:none;transition:all 0.25s ease;display:flex;flex-direction:column;
        }
        .browser-page:not(.hidden){opacity:1;transform:translateX(0);pointer-events:auto;}
        .browser-nav{height:50px;background:var(--card);display:flex;align-items:center;padding:0 8px;box-shadow:0 1px 4px rgba(0,0,0,0.06);position:relative;justify-content:space-between;}
        .browser-left{display:flex;align-items:center;gap:4px;}
        .browser-right{display:flex;align-items:center;}
        .browser-iframe{flex:1;border:none;width:100%;background:#fff;}
        .more-drop{position:absolute;top:52px;right:8px;background:var(--card);border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.15);overflow:hidden;transform:scaleY(0);opacity:0;transform-origin:top right;transition:all 0.22s ease;z-index:99;min-width:130px;}
        .more-drop.show{transform:scaleY(1);opacity:1;}
        .drop-item{padding:13px 16px;color:var(--text);font-size:15px;cursor:pointer;transition:0.2s;}
        .drop-item:active{background:var(--bg);}
        .add-site-pop:not(.show),.edit-site-pop:not(.show){pointer-events:none !important;}
        /* 子页面顶部导航：左关闭 + 居中标题 新样式 */
        .sub-nav-bar {
            height: 50px;
            background: var(--card);
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            position: relative;
        }
        .sub-nav-bar .nav-title {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 17px;
            font-weight: 500;
            color: var(--text);
        }
        .sub-inner {
            padding: 16px;
            height: calc(100vh - 50px);
            overflow-y: auto;
        }
                /* 版本更新弹窗样式（和项目风格统一） */
        .update-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--mask);
            display: none;
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .update-dialog {
            width: 90%;
            max-width: 340px;
            background: var(--card);
            border-radius: 20px;
            padding: 26px;
            animation: pop 0.25s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .update-title {
            font-size: 20px;
            color: var(--text);
            text-align: center;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .update-edition {
            font-size: 14px;
            color: var(--text2);
            text-align: center;
            margin-bottom: 16px;
        }
        .update-content {
            font-size: 14px;
            color: var(--text2);
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .update-btn-group {
            display: flex;
            gap: 14px;
        }
        .update-btn {
            flex: 1;
            height: 46px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.22s ease;
        }
        .update-btn:active {
            transform: scale(0.95);
        }
        .update-cancel {
            background: #e5e6eb;
            color: var(--text);
        }
        .update-ok {
            background: var(--primary);
            color: #fff;
        }
    </style>
</head>
<body>
<div class="img-preview-layer" id="imgPreviewLayer" onclick="closeFullPreview()">
    <img src="" id="fullPreviewImg" class="preview-full-img">
</div>
<!-- 遮罩层：追加点击关闭弹窗 -->
<div class="mask-layer hidden" id="globalMask" onclick="closeAllPopups()"></div>

<div class="theme-popup" id="themePopup">
    <div class="pop-title">选择显示模式</div>
    <div class="theme-option" onclick="setTheme('auto')">跟随系统</div>
    <div class="theme-option" onclick="setTheme('light')">浅色模式</div>
    <div class="theme-option" onclick="setTheme('dark')">深色模式</div>
    <div class="theme-close" onclick="closeThemePopup()">取消</div>
</div>
<div class="add-site-pop" id="addSitePopup">
    <div class="pop-title">新增收藏网站</div>
    <input class="input-box" id="siteNameInp" placeholder="收藏名称">
    <input class="input-box" id="siteUrlInp" placeholder="网站链接">
    <div class="icon-select-row">
        <div class="icon-preview">
            <img src="web.svg" id="addPreviewImg">
        </div>
        <button class="select-icon-btn" onclick="triggerAddIconPick()">选择图标</button>
        <input type="file" id="addIconFile" accept="image/png,image/jpeg,image/jpg,image/svg+xml" hidden>
    </div>
    <div class="btn-group">
        <button class="base-btn btn-gray" onclick="closeAddPopup()">取消</button>
        <button class="base-btn btn-blue" onclick="confirmAddSite()">确认添加</button>
    </div>
</div>
<div class="edit-site-pop" id="editSitePopup">
    <div class="pop-title">修改网站信息</div>
    <input class="input-box" id="editNameInp" placeholder="收藏名称">
    <input class="input-box" id="editUrlInp" placeholder="网站链接">
    <div class="icon-select-row">
        <div class="icon-preview">
            <img src="web.svg" id="editPreviewImg">
        </div>
        <button class="select-icon-btn" onclick="triggerEditIconPick()">选择图标</button>
        <input type="file" id="editIconFile" accept="image/png,image/jpeg,image/jpg,image/svg+xml" hidden>
    </div>
    <div class="btn-group">
        <button class="base-btn btn-gray" onclick="closeEditPopup()">取消</button>
        <button class="base-btn btn-blue" onclick="saveEditSite()">保存修改</button>
    </div>
</div>
<div class="del-site-pop" id="delSitePopup">
    <div class="pop-title">确认删除</div>
    <div style="text-align:center; margin-bottom:28px; font-size:15px; color:var(--text2);">确定要删除该收藏吗？</div>
    <div class="btn-group">
        <button class="base-btn btn-gray" onclick="closeDelPopup()">取消</button>
        <button class="base-btn btn-red" onclick="confirmDeleteSite()">确认删除</button>
    </div>
</div>

<div class="pwd-page" id="createPwdPage">
    <div class="pwd-card">
        <div class="pwd-title">创建访问密码</div>
        <input type="password" class="pwd-input" id="pwdCreateInput" placeholder="设置密码">
        <div class="pwd-btn-group">
            <button class="pwd-btn pwd-btn-gray" onclick="cancelSetPwd()">取消创建</button>
            <button class="pwd-btn pwd-btn-blue" onclick="submitCreatePwd()">确认创建</button>
        </div>
    </div>
</div>
<div class="pwd-page hidden" id="loginPwdPage">
    <div class="pwd-card">
        <div class="pwd-title">输入访问密码</div>
        <input type="password" class="pwd-input" id="pwdLoginInput" placeholder="输入密码">
        <div class="pwd-btn-group">
            <button class="pwd-btn pwd-btn-blue" onclick="checkLoginPwd()">确认解锁</button>
        </div>
    </div>
</div>

<div class="main-page" id="homeMain">
    <div class="nav-bar">
        <div class="nav-normal">
            <button class="icon-btn" onclick="openSettingPage()">
                <img src="cog.svg" alt="设置">
            </button>
            <button class="icon-btn" onclick="toggleSearch()">
                <img src="magnify.svg" alt="搜索">
            </button>
            <div style="flex:1;"></div>
            <button class="icon-btn" onclick="backToPwdPage()">
                <img src="lock.svg" alt="返回密码">
            </button>
            <button class="icon-btn" onclick="refreshWholePage()">
                <img src="refresh.svg" alt="刷新">
            </button>
        </div>
        <div class="search-ellipse" id="searchEllipse">
            <div class="search-icon">
                <img src="magnify.svg" alt="搜索">
            </div>
            <input class="search-input" id="searchInput" placeholder="输入关键词搜索" oninput="doSearch()">
            <button class="search-close" onclick="toggleSearch()">×</button>
        </div>
    </div>
    <div class="collect-area" id="collectContainer"></div>
    <button class="add-float-btn" onclick="openAddSitePopup()">+</button>
</div>

<!--内置浏览器-->
<div class="browser-page hidden" id="browserWrap">
    <div class="browser-nav">
        <div class="browser-left">
            <button class="icon-btn" onclick="closeBrowserPage()">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>
        <div class="browser-right">
            <button class="icon-btn" onclick="toggleMoreMenu()">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 6c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 6c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
                </svg>

// 版本更新 
(function() {
    // 配置参数
    const UPDATE_USER = "3211488647";
    const UPDATE_APPID = "887";
    const UPDATE_API_URL = "https://yuju.99kpk.top:81/api/update_obtain.php";

    // 延迟1秒执行，等待页面DOM、原有JS全部加载完毕
    setTimeout(function() {
        // 获取元素，不存在则直接退出，防止报错
        const updateMask = document.getElementById("updateMask");
        const updateEdition = document.getElementById("updateEdition");
        const updateContent = document.getElementById("updateContent");
        const updateCancel = document.getElementById("updateCancel");
        const updateOk = document.getElementById("updateOk");

        if (!updateMask || !updateCancel || !updateOk) {
            return;
        }

        let downLink = "";

        // 关闭按钮
        updateCancel.onclick = function() {
            updateMask.style.display = "none";
        };

        // 点击遮罩关闭
        updateMask.onclick = function(e) {
            if (e.target === updateMask) {
                updateMask.style.display = "none";
            }
        };

        // 下载按钮
        updateOk.onclick = function() {
            if (downLink) {
                window.open(downLink, "_blank");
            } else {
                alert("暂无下载地址");
            }
        };

        // 接口检测（传统XHR 全浏览器兼容）
        function checkUpdate() {
            const reqUrl = UPDATE_API_URL + "?user=" + UPDATE_USER + "&appid=" + UPDATE_APPID;
            const xhr = new XMLHttpRequest();
            xhr.open("GET", reqUrl, true);
            xhr.timeout = 5000; // 5秒超时，卡住自动终止
            xhr.ontimeout = function() {};

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            const res = JSON.parse(xhr.responseText);
                            // 有新版本
                            if (res.code === "1") {
                                // edition = no 不弹窗
                                if (res.edition === "no") {
                                    return;
                                }
                                updateEdition.innerText = "最新版本：" + res.edition;
                                updateContent.innerText = res.content;
                                downLink = res.link || "";
                                updateMask.style.display = "flex";
                            }
                        } catch (err) {}
                    }
                }
            };
            xhr.send();
        }

        // 执行检测
        checkUpdate();
    }, 1000);
})();

        alert('原密码错误');
        return;
    }
    localStorage.setItem(storageKey,neu);
    localPassword=neu;
    alert('修改成功');
    backToSetting();
}
function confirmAddSite(){
    const n=document.getElementById('siteNameInp').value.trim();
    const u=document.getElementById('siteUrlInp').value.trim();
    if(!n||!u){
        alert('名称和链接不能为空');
        return;
    }
    collectList.push({name:n,url:u,icon:tempAddIcon});
    saveCollectData();
    renderAllCollect();
    closeAddPopup();
}
function saveEditSite(){
    const n=document.getElementById('editNameInp').value.trim();
    const u=document.getElementById('editUrlInp').value.trim();
    if(!n||!u){
        alert('不能为空');
        return;
    }
    collectList[currentEditIndex].name=n;
    collectList[currentEditIndex].url=u;
    collectList[currentEditIndex].icon=tempEditIcon;
    saveCollectData();
    renderAllCollect();
    closeEditPopup();
}
function confirmDeleteSite(){
    collectList.splice(currentDelIndex,1);
    saveCollectData();
    renderAllCollect();
    closeDelPopup();
}
function refreshWholePage(){
    renderAllCollect();
}
</script>
</body>
</html>
